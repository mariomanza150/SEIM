{% extends "cms/base.html" %}
{% load wagtailcore_tags %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                {% include "cms/includes/breadcrumbs.html" %}
                
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h1 class="display-6 mb-4">{{ page.title }}</h1>
                        <div class="faq-answer cms-prose">
                            {{ page.answer|richtext }}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
