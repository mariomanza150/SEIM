<!-- Workflow Actions Component -->
<div class="workflow-actions mt-3">
    {% for transition in available_transitions %}
    <button class="btn btn-primary workflow-action"
            data-transition="{{ transition.to_status }}"
            data-requires-comment="{{ transition.requires_comment|yesno:'true,false' }}"
            data-exchange-id="{{ exchange.id }}">
        <i class="fas fa-random"></i> {{ transition.label }}
    </button>
    {% empty %}
    <span class="text-muted">No available actions</span>
    {% endfor %}
</div>

<!-- Add Note Modal -->
{% if user.is_staff %}
<div class="modal fade" id="addNoteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add Internal Note</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="addNoteForm">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="noteContent" class="form-label">Note</label>
                        <textarea class="form-control" id="noteContent" rows="3" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="noteVisibility" class="form-label">Visibility</label>
                        <select class="form-control" id="noteVisibility">
                            <option value="INTERNAL">Internal Only</option>
                            <option value="STUDENT">Visible to Student</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Note</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
$(document).ready(function() {
    // Handle note submission
    $('#addNoteForm').on('submit', function(e) {
        e.preventDefault();
        
        const noteData = {
            content: $('#noteContent').val(),
            visibility: $('#noteVisibility').val(),
            exchange_id: {{ exchange.id }}
        };
        
        $.ajax({
            url: '/api/exchanges/{{ exchange.id }}/notes/',
            type: 'POST',
            data: JSON.stringify(noteData),
            contentType: 'application/json',
            success: function(response) {
                $('#addNoteModal').modal('hide');
                $('#addNoteForm')[0].reset();
                Exchange.showAlert('Note added successfully!', 'success');
                // Reload notes section if exists
                if (typeof reloadNotes === 'function') {
                    reloadNotes();
                } else {
                    location.reload();
                }
            },
            error: function(xhr) {
                const error = xhr.responseJSON?.error || 'Failed to add note';
                Exchange.showAlert(error, 'danger');
            }
        });
    });
});
</script>
{% endif %}

<style>
.workflow-actions {
    padding: 1rem;
    background-color: #f8f9fa;
    border-radius: 0.5rem;
    border: 1px solid #dee2e6;
}

.workflow-actions .btn {
    margin: 0.25rem;
}

@media (max-width: 576px) {
    .workflow-actions .btn-group {
        display: flex;
        flex-direction: column;
        width: 100%;
    }
    
    .workflow-actions .btn-group .btn {
        width: 100%;
        margin: 0.125rem 0;
    }
}
</style>
