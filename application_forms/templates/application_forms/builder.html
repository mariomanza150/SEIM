{% extends "base.html" %}
{% load static %}

{% block title %}Form Builder - SEIM{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'application_forms/css/form-builder.css' %}">
    <style>
        /* Ensure full height for form builder */
        body {
            overflow: hidden;
        }
        
        main.container-fluid {
            padding: 0 !important;
            max-width: 100% !important;
        }
        
        footer {
            display: none;
        }
    </style>
{% endblock %}

{% block content %}
<div id="form-builder-container"></div>

<!-- Field Configuration Modal -->
<div class="modal fade field-config-modal" id="fieldConfigModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Configure Field</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="fieldConfigForm">
                    <div class="mb-3">
                        <label class="form-label">Field Label</label>
                        <input type="text" class="form-control" id="fieldLabel" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Field Name (ID)</label>
                        <input type="text" class="form-control" id="fieldName" required>
                        <small class="form-text text-muted">Used as the field identifier</small>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Placeholder</label>
                        <input type="text" class="form-control" id="fieldPlaceholder">
                    </div>
                    
                    <div class="mb-3">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="fieldRequired">
                            <label class="form-check-label" for="fieldRequired">Required Field</label>
                        </div>
                    </div>
                    
                    <div class="mb-3" id="fieldOptionsContainer" style="display: none;">
                        <label class="form-label">Options</label>
                        <div id="fieldOptionsList"></div>
                        <button type="button" class="btn btn-sm btn-outline-primary mt-2" id="btnAddOption">
                            <i class="bi bi-plus"></i> Add Option
                        </button>
                        <small class="form-text text-muted d-block mt-1">
                            Add options for select dropdown or radio buttons
                        </small>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Help Text</label>
                        <textarea class="form-control" id="fieldHelpText" rows="2"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="btnSaveFieldConfig">Save</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
    <!-- SortableJS for drag and drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <!-- Form Builder JavaScript -->
    <script src="{% static 'application_forms/js/form-builder.js' %}"></script>
    
    <script>
        // Initialize form builder when page loads
        document.addEventListener('DOMContentLoaded', function() {
            // Wait a bit to ensure all scripts are loaded
            setTimeout(function() {
                if (window.formBuilder) {
                    console.log('Form Builder initialized');
                    
                // Load existing form if form_id is provided
                {% if form_id %}
                window.formBuilder.options.formId = {{ form_id }};
                window.formBuilder.loadForm({{ form_id }});
                {% endif %}
                } else {
                    console.error('Form Builder not initialized - container may not exist');
                }
            }, 100);
        });
    </script>
{% endblock %}
