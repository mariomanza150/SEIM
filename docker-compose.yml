services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: seim
      POSTGRES_USER: seimuser
      POSTGRES_PASSWORD: seimpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"  # Use port 5434 to avoid conflict with bmad-postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seimuser -d seim"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.2-alpine
    container_name: seim-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  web:
    build: .
    # Use Daphne (ASGI server) for production-like WebSocket support
    command: bash -c "/app/scripts/ensure_vue_dist.sh && python manage.py collectstatic --noinput && daphne -b 0.0.0.0 -p 8000 seim.asgi:application"
    volumes:
      - .:/app
      # Bind mount hides image-built ``frontend-vue/dist``. Named volume can initialize empty; on start
      # ``scripts/ensure_vue_dist.sh`` copies from ``/opt/seim-vue-dist`` (see Dockerfile). After Vue changes:
      # ``docker compose build web`` then ``docker compose up`` (or ``docker volume rm`` that volume to re-seed).
      - vue_frontend_dist:/app/frontend-vue/dist
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8001:8000"  # Use port 8001 externally to avoid conflict with bmad-taiga
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DJANGO_SETTINGS_MODULE=seim.settings.development
      - DJANGO_ENV=dev
      - DEBUG=true
      - DISABLE_THROTTLE_E2E=1

  celery:
    build: .
    command: bash -c "/app/scripts/wait-for-db.sh && celery -A seim worker --loglevel=info"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build: .
    command: bash -c "/app/scripts/wait-for-db.sh && celery -A seim beat --loglevel=info"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    # Coverage scope matches CI: pytest.ini addopts + pyproject.toml [tool.coverage.run] (excludes cms / Wagtail-stripped code).
    command: bash -c "/app/scripts/wait-for-db.sh && pytest tests/unit/ tests/integration/"
    volumes:
      - .:/app
      - test_coverage:/app/htmlcov
    env_file:
      - .env
    environment:
      - DJANGO_ENV=test
      - DEBUG=false
      - TESTING=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - test

volumes:
  postgres_data:
  vue_frontend_dist:
  static_volume:
  media_volume:
  test_coverage:
  redis_data:
    driver: local 