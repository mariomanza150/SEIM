<!-- Search Form Component -->
<form class="search-form" method="get" action="{{ search_url|default:'#' }}" role="search" aria-label="Search form">
    <div class="input-group">
        <!-- Search Input -->
        <div class="form-floating flex-grow-1">
            <input 
                type="search" 
                class="form-control" 
                id="search-input" 
                name="q" 
                placeholder="{{ placeholder|default:'Search...' }}"
                value="{{ request.GET.q|default:'' }}"
                aria-label="{{ placeholder|default:'Search...' }}"
                autocomplete="off"
            >
            <label for="search-input">{{ placeholder|default:'Search...' }}</label>
        </div>
        
        <!-- Search Button -->
        <button class="btn btn-primary" type="submit" aria-label="Submit search">
            <i class="bi bi-search" aria-hidden="true"></i>
            <span class="d-none d-sm-inline">Search</span>
        </button>
        
        <!-- Clear Button (if search has value) -->
        {% if request.GET.q %}
        <a href="{{ request.path }}" class="btn btn-outline-secondary" aria-label="Clear search">
            <i class="bi bi-x-lg" aria-hidden="true"></i>
            <span class="d-none d-sm-inline">Clear</span>
        </a>
        {% endif %}
    </div>
    
    <!-- Advanced Search Toggle -->
    {% if show_advanced %}
    <div class="mt-2">
        <button type="button" class="btn btn-link btn-sm p-0" data-bs-toggle="collapse" data-bs-target="#advanced-search" aria-expanded="false" aria-controls="advanced-search">
            <i class="bi bi-funnel" aria-hidden="true"></i>
            Advanced Search
        </button>
    </div>
    
    <!-- Advanced Search Options -->
    <div class="collapse mt-3" id="advanced-search">
        <div class="card card-body">
            <div class="row g-3">
                <!-- Status Filter -->
                <div class="col-md-4">
                    <label for="status-filter" class="form-label">Status</label>
                    <select class="form-select" id="status-filter" name="status">
                        <option value="">All Statuses</option>
                        <option value="draft" {% if request.GET.status == 'draft' %}selected{% endif %}>Draft</option>
                        <option value="submitted" {% if request.GET.status == 'submitted' %}selected{% endif %}>Submitted</option>
                        <option value="under_review" {% if request.GET.status == 'under_review' %}selected{% endif %}>Under Review</option>
                        <option value="approved" {% if request.GET.status == 'approved' %}selected{% endif %}>Approved</option>
                        <option value="rejected" {% if request.GET.status == 'rejected' %}selected{% endif %}>Rejected</option>
                    </select>
                </div>
                
                <!-- Date Range -->
                <div class="col-md-4">
                    <label for="date-from" class="form-label">Date From</label>
                    <input type="date" class="form-control" id="date-from" name="date_from" value="{{ request.GET.date_from|default:'' }}">
                </div>
                
                <div class="col-md-4">
                    <label for="date-to" class="form-label">Date To</label>
                    <input type="date" class="form-control" id="date-to" name="date_to" value="{{ request.GET.date_to|default:'' }}">
                </div>
            </div>
            
            <!-- Advanced Search Actions -->
            <div class="mt-3 d-flex gap-2">
                <button type="submit" class="btn btn-primary btn-sm">
                    <i class="bi bi-search" aria-hidden="true"></i> Apply Filters
                </button>
                <a href="{{ request.path }}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-clockwise" aria-hidden="true"></i> Reset
                </a>
            </div>
        </div>
    </div>
    {% endif %}
</form>

<!-- Search Results Summary -->
{% if search_results %}
<div class="search-results-summary mt-3">
    <p class="text-muted mb-0">
        Found {{ search_results.paginator.count }} result{{ search_results.paginator.count|pluralize }}
        {% if request.GET.q %}
        for "{{ request.GET.q }}"
        {% endif %}
    </p>
</div>
{% endif %}
