{% load static %}

<!-- Footer Component -->
<footer class="bg-light py-4 mt-5" role="contentinfo">
    <div class="container">
        <div class="row align-items-center">
            <!-- Copyright -->
            <div class="col-md-6">
                <p class="mb-0 text-muted">
                    &copy; {% now "Y" %} SEIM - Student Exchange Information Manager
                </p>
            </div>
            
            <!-- Links -->
            <div class="col-md-6 text-md-end">
                <nav class="footer-nav" aria-label="Footer navigation">
                    <ul class="list-inline mb-0">
                        <li class="list-inline-item">
                            <a href="#" class="text-decoration-none text-muted" aria-label="Privacy Policy">
                                Privacy Policy
                            </a>
                        </li>
                        <li class="list-inline-item">
                            <span class="text-muted">|</span>
                        </li>
                        <li class="list-inline-item">
                            <a href="#" class="text-decoration-none text-muted" aria-label="Terms of Service">
                                Terms of Service
                            </a>
                        </li>
                        <li class="list-inline-item">
                            <span class="text-muted">|</span>
                        </li>
                        <li class="list-inline-item">
                            <a href="#" class="text-decoration-none text-muted" aria-label="Help">
                                Help
                            </a>
                        </li>
                        <li class="list-inline-item">
                            <span class="text-muted">|</span>
                        </li>
                        <li class="list-inline-item">
                            <a href="#" class="text-decoration-none text-muted" aria-label="Contact">
                                Contact
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
        
        <!-- Version Info (for development) -->
        {% if debug %}
        <div class="row mt-2">
            <div class="col-12">
                <small class="text-muted">
                    Version: {{ version|default:"Development" }} | 
                    Environment: {{ environment|default:"Development" }}
                </small>
            </div>
        </div>
        {% endif %}
    </div>
</footer>
