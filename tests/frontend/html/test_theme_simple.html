<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Toggle Test</title>
    <style>
        /* Test CSS variables */
        :root {
            --primary-color: #0d6efd;
            --bg-primary: #ffffff;
            --text-primary: #212529;
            --border-color: #dee2e6;
        }
        
        [data-theme="dark"] {
            --bg-primary: #212529;
            --text-primary: #f8f9fa;
            --border-color: #495057;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
            margin: 0;
            padding: 20px;
        }
        
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .theme-toggle {
            color: var(--text-primary) !important;
            background-color: transparent !important;
            border-color: var(--border-color) !important;
            transition: all 0.3s ease !important;
        }
        
        .theme-toggle:hover {
            color: var(--primary-color) !important;
            background-color: rgba(13, 110, 253, 0.1) !important;
            border-color: var(--primary-color) !important;
        }
        
        .test-button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        
        .status {
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }
        
        .status.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>Theme Toggle Test</h1>
        <p>This page tests the theme toggle functionality.</p>
        
        <div id="status-container"></div>
        
        <h2>Test Controls</h2>
        <button class="test-button" onclick="testThemeToggle()">Test Theme Toggle</button>
        <button class="test-button" onclick="checkThemeStatus()">Check Theme Status</button>
        <button class="test-button" onclick="simulateToggle()">Simulate Toggle</button>
        
        <h2>Theme Toggle Button</h2>
        <button id="theme-toggle" class="btn btn-outline-secondary btn-sm theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
            <i class="bi bi-moon-fill" aria-hidden="true">🌙</i>
        </button>
        
        <h2>Test Content</h2>
        <p>This is a test paragraph to verify text contrast in both themes.</p>
        <div style="background-color: var(--border-color); padding: 10px; border-radius: 4px;">
            <p>This is a test div with background color to verify contrast.</p>
        </div>
    </div>

    <script>
        // Simple theme manager for testing
        class SimpleThemeManager {
            constructor() {
                this.themeKey = 'seim-theme';
                this.currentTheme = this.getStoredTheme() || 'light';
                this.init();
            }
            
            getStoredTheme() {
                try {
                    return localStorage.getItem(this.themeKey);
                } catch (error) {
                    return null;
                }
            }
            
            storeTheme(theme) {
                try {
                    localStorage.setItem(this.themeKey, theme);
                } catch (error) {
                    console.warn('Could not store theme preference:', error);
                }
            }
            
            applyTheme(theme) {
                const html = document.documentElement;
                html.removeAttribute('data-theme');
                
                if (theme === 'dark') {
                    html.setAttribute('data-theme', 'dark');
                }
                
                this.storeTheme(theme);
                this.currentTheme = theme;
                this.updateToggleState();
            }
            
            toggleTheme() {
                const newTheme = this.currentTheme === 'light' ? 'dark' : 'light';
                this.applyTheme(newTheme);
            }
            
            updateToggleState() {
                const toggle = document.getElementById('theme-toggle');
                if (toggle) {
                    const icon = toggle.querySelector('i');
                    const isDark = this.currentTheme === 'dark';
                    icon.textContent = isDark ? '☀️' : '🌙';
                    toggle.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
                    toggle.setAttribute('title', isDark ? 'Switch to light mode' : 'Switch to dark mode');
                }
            }
            
            init() {
                this.applyTheme(this.currentTheme);
                this.setupEventListeners();
            }
            
            setupEventListeners() {
                const toggle = document.getElementById('theme-toggle');
                if (toggle) {
                    toggle.addEventListener('click', (e) => {
                        e.preventDefault();
                        this.toggleTheme();
                    });
                }
            }
            
            getCurrentTheme() {
                return this.currentTheme;
            }
            
            isDarkMode() {
                return this.currentTheme === 'dark';
            }
        }
        
        // Initialize theme manager
        let themeManager;
        
        function addStatus(message, type = 'info') {
            const container = document.getElementById('status-container');
            const status = document.createElement('div');
            status.className = `status ${type}`;
            status.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            container.appendChild(status);
            container.scrollTop = container.scrollHeight;
        }
        
        function testThemeToggle() {
            addStatus('Testing theme toggle functionality...', 'info');
            
            if (!themeManager) {
                addStatus('Theme manager not initialized', 'error');
                return;
            }
            
            const initialTheme = themeManager.getCurrentTheme();
            addStatus(`Initial theme: ${initialTheme}`, 'info');
            
            // Toggle theme
            themeManager.toggleTheme();
            
            const newTheme = themeManager.getCurrentTheme();
            addStatus(`New theme: ${newTheme}`, 'info');
            
            if (initialTheme !== newTheme) {
                addStatus('✅ Theme toggle successful!', 'success');
            } else {
                addStatus('❌ Theme toggle failed', 'error');
            }
        }
        
        function checkThemeStatus() {
            addStatus('Checking theme status...', 'info');
            
            if (!themeManager) {
                addStatus('Theme manager not initialized', 'error');
                return;
            }
            
            const currentTheme = themeManager.getCurrentTheme();
            const isDark = themeManager.isDarkMode();
            const storedTheme = localStorage.getItem('seim-theme');
            
            addStatus(`Current theme: ${currentTheme}`, 'info');
            addStatus(`Dark mode: ${isDark}`, 'info');
            addStatus(`Stored theme: ${storedTheme || 'none'}`, 'info');
            
            // Check CSS variables
            const styles = getComputedStyle(document.documentElement);
            const textColor = styles.getPropertyValue('--text-primary');
            const bgColor = styles.getPropertyValue('--bg-primary');
            
            addStatus(`Text color: ${textColor}`, 'info');
            addStatus(`Background color: ${bgColor}`, 'info');
        }
        
        function simulateToggle() {
            addStatus('Simulating toggle button click...', 'info');
            
            const toggle = document.getElementById('theme-toggle');
            if (toggle) {
                toggle.click();
                addStatus('✅ Toggle button clicked', 'success');
            } else {
                addStatus('❌ Toggle button not found', 'error');
            }
        }
        
        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', function() {
            addStatus('Page loaded, initializing theme manager...', 'info');
            themeManager = new SimpleThemeManager();
            addStatus('✅ Theme manager initialized', 'success');
            checkThemeStatus();
        });
    </script>
</body>
</html>
