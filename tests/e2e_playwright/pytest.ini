[pytest]
# Pytest configuration for Playwright E2E tests

# Django settings module for E2E tests
DJANGO_SETTINGS_MODULE = seim.settings.test

# Test paths
testpaths = .

# Python files pattern
python_files = test_*.py

# Test discovery
python_classes = Test*
python_functions = test_*

# Markers
markers =
    e2e_playwright: End-to-end tests using Playwright
    vue: Vue.js SPA UI tests (run with BASE_URL=Vue dev server)
    nondestructive: Tests that do not modify persistent data
    auth: Authentication workflow tests
    workflow: Workflow tests for user journeys
    student: Student workflow tests
    coordinator: Coordinator workflow tests
    admin: Admin workflow tests
    video_demo: Video demo tests that record walkthroughs
    visual: Visual regression tests
    accessibility: Accessibility tests
    slow: Slow running tests
    smoke: Smoke tests (critical paths)
    regression: Regression tests
    file_upload: File upload tests
    document: Document management tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --maxfail=5
    -p no:warnings
    --asyncio-mode=auto

# Parallel execution (commented out by default, uncomment to enable)
# addopts = -n auto

# Test timeout
timeout = 300

# Console output style
console_output_style = progress

# Log settings
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

