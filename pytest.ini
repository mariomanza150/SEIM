[pytest]
DJANGO_SETTINGS_MODULE = seim.settings.test
python_files = tests.py test_*.py *_tests.py
testpaths = tests
addopts = 
    --strict-markers
    --strict-config
    --cov=.
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-fail-under=80
    --tb=short
    --maxfail=10
    --durations=10
markers =
    unit: Unit tests for individual components
    integration: Integration tests for cross-module workflows
    e2e: End-to-end browser tests (HOST OS ONLY)
    e2e_playwright: End-to-end tests using Playwright
    visual: Visual regression tests
    accessibility: Accessibility compliance tests (WCAG)
    slow: Slow running tests (>1 second)
    api: API endpoint tests
    auth: Authentication and authorization tests
    models: Model-specific tests
    views: View and API view tests
    serializers: Serializer tests
    forms: Form validation tests
    services: Service layer tests
    celery: Celery task tests
    cache: Cache-related tests
    email: Email functionality tests
    file_upload: File upload and processing tests
    workflow: Business workflow tests
    performance: Performance and load tests
    security: Security-focused tests
    database: Database-specific tests
    external: External service integration tests 