[tool:pytest]
DJANGO_SETTINGS_MODULE = seim.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = 
    --verbose
    --reuse-db
    --nomigrations
    --cov=exchange
    --cov-report=html
    --cov-report=term-missing
testpaths = 
    SEIM/exchange/tests
norecursedirs = .git .tox dist build *.egg
