name: MCP Tool Usage Guidelines
version: 0.0.1
schema: v1
rules:
  - Use 'builtin_read_file' to view contents of files by specifying the 'filepath' parameter.
  - Edit files using 'builtin_edit_existing_file' with 'filepath' and 'changes' parameters for specific code modifications.
  - Create files with 'builtin_create_new_file', providing 'filepath' and 'contents'.
  - Execute terminal commands using 'builtin_run_terminal_command', specifying 'command' and optionally 'waitForCompletion'.
  - Perform regex searches with 'builtin_grep_search' using the 'query' parameter.
  - List directory contents with 'builtin_ls', using 'dirPath' and 'recursive' as needed.
  - Conduct web searches with 'builtin_search_web', utilizing the 'query' parameter.
  - Manage knowledge graph entities with 'create_entities', providing arrays for 'entities'.
  - Establish graph relations using 'create_relations' with 'from', 'to', and 'relationType' parameters.
  - Add observations to entities via 'add_observations', specifying 'entityName' and 'contents'.
  - Use 'delete_entities' and 'delete_relations' for removing items from the knowledge graph.
  - Read entire graph data with 'read_graph' and search nodes using 'search_nodes' and 'query'.
  - Open specific graph nodes with 'open_nodes' by naming them in an array.
  - View diffs of working changes using 'builtin_view_diff'.
  - Read the open IDE file through 'builtin_read_currently_open_file'.
  - Define persistent interaction rules with 'builtin_create_rule_block' using 'name' and 'rule'.
  - Execute dynamic problem-solving using 'sequentialthinking' for thoughtful analysis.
  - Run terminal commands and get results via 'execute_command', specifying 'command' and 'timeout'.
  - Obtain command history using 'get_command_history' with 'count'.
  - Identify current directory using 'get_current_directory' and change it with 'change_directory'.
  - Write to files with 'write_file', selecting 'path', 'content', and 'mode'.
  - Employ 'read_file' for reading file content with options for row selection and JSON parsing.
  - Insert file content using 'insert_file_content', with 'path', 'content', 'row', or 'rows'.
  - Remove file content using 'delete_file_content', specifying 'path', 'row(s)', and optional 'substring'.
  - Update file rows with 'update_file_content' and parameters 'path', 'content', and 'row(s)'.