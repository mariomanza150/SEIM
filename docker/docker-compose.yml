services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - .env.dev
    environment:
      - DJANGO_ENV=dev
    ports:
      - "8000:8000"
    volumes:
      - ../scripts/:/app/scripts/:r
      - ../SEIM/:/app:rw
      - logs:/app/logs
      - media:/app/media
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: seim
      POSTGRES_USER: seim_user
      POSTGRES_PASSWORD: seim_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    restart: unless-stopped
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  logs:
  media:
  redis_data:
