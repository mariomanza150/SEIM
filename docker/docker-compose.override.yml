services:
  web:
    # Ensure proper signal handling for graceful shutdown
    stop_signal: SIGTERM
    stop_grace_period: 30s
    
  db:
    # Ensure proper signal handling for graceful shutdown
    stop_signal: SIGTERM
    stop_grace_period: 30s
    # Add command to ensure proper shutdown
    command: postgres -c shared_preload_libraries=pg_stat_statements
