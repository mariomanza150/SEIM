services:
  db:
    image: postgres:15-alpine
    container_name: seim-db-local-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: seim_prod
      POSTGRES_USER: seimuser
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme123}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - seim-prod-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seimuser -d seim_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: seim-redis-local-prod
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_prod_data:/data
    networks:
      - seim-prod-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: seim-web-local-prod
    restart: unless-stopped
    # One shell command line so gunicorn receives --bind (multiline sh -c breaks the arg list).
    command:
      - sh
      - -c
      - |
          set -e
          echo 'Waiting for database...'
          python manage.py migrate
          echo 'Collecting static files...'
          python manage.py collectstatic --noinput
          echo 'Starting Gunicorn...'
          exec gunicorn seim.wsgi:application \
            --bind 0.0.0.0:8000 \
            --workers 2 \
            --worker-class sync \
            --timeout 30 \
            --access-logfile - \
            --error-logfile - \
            --log-level info
    ports:
      - "8002:8000"
    volumes:
      - static_prod_volume:/app/staticfiles
      - media_prod_volume:/app/media
    networks:
      - seim-prod-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DJANGO_SETTINGS_MODULE=seim.settings.production
      - DJANGO_ENV=production
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-me-in-real-production}
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - DATABASE_URL=postgresql://seimuser:${DB_PASSWORD:-changeme123}@db:5432/seim_prod
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      - SECURE_SSL_REDIRECT=False
      - SESSION_COOKIE_SECURE=False
      - CSRF_COOKIE_SECURE=False
      - SECURE_HSTS_SECONDS=0
      - CORS_ALLOWED_ORIGINS=http://localhost:8002,http://127.0.0.1:8002
      - CSRF_TRUSTED_ORIGINS=http://localhost:8002,http://127.0.0.1:8002

  celery:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: seim-celery-local-prod
    restart: unless-stopped
    command: celery -A seim worker --loglevel=info --concurrency=2
    volumes:
      - media_prod_volume:/app/media
    networks:
      - seim-prod-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery inspect ping -d celery@$$HOSTNAME"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      - DJANGO_SETTINGS_MODULE=seim.settings.production
      - DJANGO_ENV=production
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-me-in-real-production}
      - DATABASE_URL=postgresql://seimuser:${DB_PASSWORD:-changeme123}@db:5432/seim_prod
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: seim-celery-beat-local-prod
    restart: unless-stopped
    command: celery -A seim beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    networks:
      - seim-prod-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery status > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    environment:
      - DJANGO_SETTINGS_MODULE=seim.settings.production
      - DJANGO_ENV=production
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-me-in-real-production}
      - DATABASE_URL=postgresql://seimuser:${DB_PASSWORD:-changeme123}@db:5432/seim_prod
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0

volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local
  static_prod_volume:
    driver: local
  media_prod_volume:
    driver: local

networks:
  seim-prod-network:
    driver: bridge