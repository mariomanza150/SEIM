<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Default EN; shell script aligns with vue-i18n before module load. Keep in sync with src/locales/{en,es}.json appMeta (metaDescription, socialTitle). -->
    <meta
      name="description"
      content="SEIM — Student Exchange Information Management: applications, documents, deadlines, and notifications for exchange programs."
    />
    <!-- Default light chrome; shell script may switch for dark / stored theme. Match uiPreferences.js THEME_COLOR_*. -->
    <meta name="theme-color" content="#667eea" />
    <!-- Hint scrollbars/form controls; shell + uiPreferences align with theme auto/light/dark. -->
    <meta name="color-scheme" content="light dark" />

    <!-- Shared SEIM tokens (Django + SPA) -->
    <link rel="stylesheet" href="/static/css/utilities/seim-shared-tokens.css" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <!-- Default matches route.fallbackTitle / router before first navigation; script may set html[lang] + meta for es. -->
    <title>SEIM</title>
    <script id="seim-shell-bootstrap">
      ;(function () {
        var LOCALE_KEY = 'seim.ui_locale'
        var PREFS_KEY = 'seim_ui_preferences'
        var THEME_LIGHT = '#667eea'
        var THEME_DARK = '#111827'
        var META = {
          en:
            'SEIM — Student Exchange Information Management: applications, documents, deadlines, and notifications for exchange programs.',
          es:
            'SEIM — Gestión de información de intercambio estudiantil: solicitudes, documentos, plazos y notificaciones para programas de intercambio.',
        }
        function resolveShellTheme(pref) {
          if (pref === 'dark') return 'dark'
          if (pref === 'light') return 'light'
          if (
            typeof window !== 'undefined'
            && window.matchMedia
            && window.matchMedia('(prefers-color-scheme: dark)').matches
          ) {
            return 'dark'
          }
          return 'light'
        }
        var storedLocale = null
        try {
          storedLocale = localStorage.getItem(LOCALE_KEY)
        } catch (e) {}
        var loc =
          storedLocale === 'es' || storedLocale === 'en'
            ? storedLocale
            : (function () {
                var lang = (typeof navigator !== 'undefined' && navigator.language ? navigator.language : '')
                  .toLowerCase()
                return lang.indexOf('es') === 0 ? 'es' : 'en'
              })()
        document.documentElement.lang = loc
        document.title = 'SEIM'
        var m = document.querySelector('meta[name="description"]')
        if (m) m.setAttribute('content', META[loc] || META.en)

        var OG_TITLE = {
          en: 'SEIM — Student Exchange Information Management',
          es: 'SEIM — Gestión de información de intercambio estudiantil',
        }
        function upsertMeta(by, key, content) {
          var el = document.head.querySelector('meta[' + by + '="' + key + '"]')
          if (!el) {
            el = document.createElement('meta')
            el.setAttribute(by, key)
            document.head.appendChild(el)
          }
          el.setAttribute('content', content)
        }
        function upsertLinkRel(rel, href) {
          var el = document.head.querySelector('link[rel="' + rel + '"]')
          if (!el) {
            el = document.createElement('link')
            el.setAttribute('rel', rel)
            document.head.appendChild(el)
          }
          el.setAttribute('href', href)
        }
        var ogDesc = META[loc] || META.en
        var ogTi = OG_TITLE[loc] || OG_TITLE.en
        upsertMeta('property', 'og:title', ogTi)
        upsertMeta('property', 'og:description', ogDesc)
        upsertMeta('property', 'og:locale', loc === 'es' ? 'es_ES' : 'en_US')
        upsertMeta('property', 'og:locale:alternate', loc === 'es' ? 'en_US' : 'es_ES')
        upsertMeta('property', 'og:site_name', 'SEIM')
        upsertMeta('property', 'og:type', 'website')
        upsertMeta('name', 'twitter:card', 'summary')
        upsertMeta('name', 'twitter:title', ogTi)
        upsertMeta('name', 'twitter:description', ogDesc)

        try {
          if (typeof window !== 'undefined' && window.location && window.location.href) {
            var shareImg = new URL('vite.svg', window.location.href).href
            upsertMeta('property', 'og:image', shareImg)
            upsertMeta('name', 'twitter:image', shareImg)
          }
        } catch (e) {}

        try {
          if (typeof window !== 'undefined' && window.location && window.location.href) {
            var pageUrl = window.location.href.split('#')[0]
            upsertLinkRel('canonical', pageUrl)
            upsertMeta('property', 'og:url', pageUrl)
            upsertMeta('name', 'twitter:url', pageUrl)
          }
        } catch (e) {}

        var themePref = 'auto'
        try {
          var raw = localStorage.getItem(PREFS_KEY)
          if (raw) {
            var p = JSON.parse(raw)
            if (p && (p.theme === 'dark' || p.theme === 'light' || p.theme === 'auto')) themePref = p.theme
          }
        } catch (e) {}
        var resolvedTheme = resolveShellTheme(themePref)
        var tc = document.querySelector('meta[name="theme-color"]')
        if (tc) tc.setAttribute('content', resolvedTheme === 'dark' ? THEME_DARK : THEME_LIGHT)
        var cs =
          themePref === 'dark' ? 'dark' : themePref === 'light' ? 'light' : 'light dark'
        upsertMeta('name', 'color-scheme', cs)
      })()
    </script>
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    
    <!-- Fallback when JavaScript is disabled (static; EN + ES — SPA i18n does not run) -->
    <noscript>
      <div
        role="alert"
        style="text-align: center; padding: 50px; max-width: 36rem; margin: 0 auto; font-family: system-ui, sans-serif"
      >
        <h1 style="margin-bottom: 0.75rem; font-size: 1.25rem">
          JavaScript required / Se requiere JavaScript
        </h1>
        <p lang="en" style="margin: 0.35rem 0">Please enable JavaScript to use SEIM.</p>
        <p lang="es" style="margin: 0.35rem 0">Activa JavaScript para utilizar SEIM.</p>
      </div>
    </noscript>
  </body>
</html>
