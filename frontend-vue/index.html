<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SEIM - Student Exchange Information Management System" />
    <meta name="theme-color" content="#667eea" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <!-- Title -->
    <title>SEIM - Student Exchange Information Management</title>
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    
    <!-- Fallback when JavaScript is disabled (static; EN + ES — SPA i18n does not run) -->
    <noscript>
      <div
        role="alert"
        style="text-align: center; padding: 50px; max-width: 36rem; margin: 0 auto; font-family: system-ui, sans-serif"
      >
        <h1 style="margin-bottom: 0.75rem; font-size: 1.25rem">
          JavaScript required / Se requiere JavaScript
        </h1>
        <p lang="en" style="margin: 0.35rem 0">Please enable JavaScript to use SEIM.</p>
        <p lang="es" style="margin: 0.35rem 0">Activa JavaScript para utilizar SEIM.</p>
      </div>
    </noscript>
  </body>
</html>
