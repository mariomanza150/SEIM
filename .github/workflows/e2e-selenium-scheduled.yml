# Legacy Selenium / pytest browser tests — not run on every PR (Playwright is in e2e-tests.yml).

name: E2E Selenium (scheduled)

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  DJANGO_SETTINGS_MODULE: seim.settings.test
  DJANGO_ENV: test
  DEBUG: "false"
  SECRET_KEY: ci-not-a-secret-key-for-tests-only

jobs:
  selenium:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: seim_test
          POSTGRES_USER: seimuser
          POSTGRES_PASSWORD: seimpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Install Node (static assets if needed)
        run: npm ci

      - uses: browser-actions/setup-chrome@v1

      - name: Migrate and seed
        env:
          DATABASE_URL: postgresql://seimuser:seimpass@localhost:5432/seim_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          python manage.py migrate --noinput
          python manage.py create_initial_data

      - name: Start Django
        env:
          DATABASE_URL: postgresql://seimuser:seimpass@localhost:5432/seim_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          python manage.py runserver 0.0.0.0:8000 &
          sleep 15

      - name: Run Selenium E2E
        env:
          DATABASE_URL: postgresql://seimuser:seimpass@localhost:5432/seim_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          python -m pytest tests/e2e/ tests/selenium/ \
            --junitxml=selenium-e2e-results.xml \
            -v --tb=short

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-e2e-results
          path: selenium-e2e-results.xml
          retention-days: 14
