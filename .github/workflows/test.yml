name: Test Suite

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: seim_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/seim_test
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SETTINGS_MODULE: seim.settings.test
          SECRET_KEY: test-secret-key-for-ci
        run: |
          python manage.py migrate --noinput

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/seim_test
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SETTINGS_MODULE: seim.settings.test
          SECRET_KEY: test-secret-key-for-ci
        run: |
          pytest tests/ --cov=. --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Check test count
        run: |
          TEST_COUNT=$(pytest --collect-only -q tests/ 2>&1 | tail -1 | grep -oE '[0-9]+ test' | grep -oE '[0-9]+')
          echo "Total tests: $TEST_COUNT"
          if [ "$TEST_COUNT" -lt 1000 ]; then
            echo "Warning: Test count below 1000"
            exit 1
          fi

