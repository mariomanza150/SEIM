name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

env:
  DJANGO_SETTINGS_MODULE: seim.settings.test
  DJANGO_ENV: test
  DEBUG: false

jobs:
  # Code Quality Checks
  quality-check:
    runs-on: ubuntu-latest
    name: Code Quality & Security
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
        
    - name: Run code formatting check (ruff)
      run: |
        ruff check . --output-format=github
        ruff format --check .
        
    - name: Run security check (bandit)
      run: |
        bandit -r . -f json -o bandit-report.json || true
        bandit -r . -f txt
        
    - name: Run type checking (mypy)
      run: |
        mypy . --ignore-missing-imports || true

  # Backend Tests
  backend-tests:
    runs-on: ubuntu-latest
    name: Backend Tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: seim_test
          POSTGRES_USER: seimuser
          POSTGRES_PASSWORD: seimpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7.2-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-test.txt
        
    - name: Run database migrations
      env:
        DATABASE_URL: postgresql://seimuser:seimpass@localhost:5432/seim_test
        REDIS_URL: redis://localhost:6379/0
      run: |
        python manage.py migrate --run-syncdb
        
    - name: Run backend tests with coverage
      env:
        DATABASE_URL: postgresql://seimuser:seimpass@localhost:5432/seim_test
        REDIS_URL: redis://localhost:6379/0
      run: |
        pytest --cov=. --cov-report=xml --cov-report=html --cov-fail-under=80 \
               --junitxml=test-results.xml \
               tests/unit/ tests/integration/ \
               -v --tb=short
               
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: backend
        name: backend-coverage
        
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results
        path: test-results.xml

  # Frontend Tests
  frontend-tests:
    runs-on: ubuntu-latest
    name: Frontend Tests
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run ESLint
      run: npx eslint static/js/ tests/frontend/ --format=github
      
    - name: Run Prettier check
      run: npx prettier --check static/js/ tests/frontend/
      
    - name: Run Jest tests
      run: npx jest --config=jest.config.js --coverage --ci --watchAll=false
      
    - name: Upload frontend coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/lcov.info
        flags: frontend
        name: frontend-coverage

  # End-to-End Tests
  e2e-tests:
    runs-on: ubuntu-latest
    name: E2E Tests
    needs: [backend-tests]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: seim_test
          POSTGRES_USER: seimuser
          POSTGRES_PASSWORD: seimpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7.2-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
        
    - name: Install Node dependencies
      run: npm ci
      
    - name: Install Chrome
      uses: browser-actions/setup-chrome@v1
      
    - name: Run database migrations
      env:
        DATABASE_URL: postgresql://seimuser:seimpass@localhost:5432/seim_test
        REDIS_URL: redis://localhost:6379/0
      run: |
        python manage.py migrate --run-syncdb
        python manage.py create_initial_data
        
    - name: Start Django server
      env:
        DATABASE_URL: postgresql://seimuser:seimpass@localhost:5432/seim_test
        REDIS_URL: redis://localhost:6379/0
      run: |
        python manage.py runserver 0.0.0.0:8000 &
        sleep 10
        
    - name: Run Selenium E2E tests
      run: |
        python -m pytest tests/e2e/ tests/selenium/ \
               --junitxml=e2e-test-results.xml \
               -v --tb=short
               
    - name: Upload E2E test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: e2e-test-results
        path: e2e-test-results.xml

  # Docker Build & Security Scan
  docker-security:
    runs-on: ubuntu-latest
    name: Docker Security Scan
    needs: [quality-check, backend-tests, frontend-tests]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build Docker image
      run: docker build -t seim:test .
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'seim:test'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  # Deployment (only on main branch)
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Production
    needs: [quality-check, backend-tests, frontend-tests, e2e-tests, docker-security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Deploy to production
      run: |
        echo "🚀 Deploying to production..."
        # Add your deployment commands here
        # Example: kubectl apply, docker-compose up, etc.
        echo "✅ Deployment completed successfully!"
        
    - name: Notify deployment status
      run: |
        echo "📢 Production deployment notification"
        # Add notification logic (Slack, email, etc.)

  # Performance Tests
  performance-tests:
    runs-on: ubuntu-latest
    name: Performance Tests
    needs: [backend-tests]
    if: github.event_name == 'pull_request'
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: seim_test
          POSTGRES_USER: seimuser
          POSTGRES_PASSWORD: seimpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7.2-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-test.txt
        pip install locust
        
    - name: Run database migrations
      env:
        DATABASE_URL: postgresql://seimuser:seimpass@localhost:5432/seim_test
        REDIS_URL: redis://localhost:6379/0
      run: |
        python manage.py migrate --run-syncdb
        python manage.py create_initial_data
        
    - name: Start Django server
      env:
        DATABASE_URL: postgresql://seimuser:seimpass@localhost:5432/seim_test
        REDIS_URL: redis://localhost:6379/0
      run: |
        python manage.py runserver 0.0.0.0:8000 &
        sleep 10
        
    - name: Run performance tests
      run: |
        locust -f tests/performance/locustfile.py \
               --host=http://localhost:8000 \
               --users=10 --spawn-rate=2 --run-time=30s \
               --headless --html=performance-report.html
               
    - name: Upload performance report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: performance-report
        path: performance-report.html
