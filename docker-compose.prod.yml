services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: seim-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-seim}
      POSTGRES_USER: ${POSTGRES_USER:-seimuser}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - seim-network
    secrets:
      - db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seimuser} -d ${POSTGRES_DB:-seim}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Redis Cache & Message Broker
  redis:
    image: redis:7.2-alpine
    container_name: seim-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - seim-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ClamAV Virus Scanner
  clamav:
    image: clamav/clamav:1.0-alpine
    container_name: seim-clamav-prod
    restart: unless-stopped
    volumes:
      - clamav_data:/var/lib/clamav
    networks:
      - seim-network
    healthcheck:
      test: ["CMD", "clamdscan", "--ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Django Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: seim-web-prod
    restart: unless-stopped
    # Single shell script so gunicorn receives all flags (multiline sh -c drops --bind et al.).
    command:
      - sh
      - -c
      - |
          set -e
          python manage.py migrate
          python manage.py collectstatic --noinput
          exec gunicorn seim.wsgi:application \
            --bind 0.0.0.0:8000 \
            --workers ${GUNICORN_WORKERS:-3} \
            --worker-class ${GUNICORN_WORKER_CLASS:-sync} \
            --worker-connections ${GUNICORN_WORKER_CONNECTIONS:-1000} \
            --max-requests ${GUNICORN_MAX_REQUESTS:-1000} \
            --max-requests-jitter ${GUNICORN_MAX_REQUESTS_JITTER:-100} \
            --timeout ${GUNICORN_TIMEOUT:-30} \
            --keep-alive ${GUNICORN_KEEP_ALIVE:-2} \
            --access-logfile - \
            --error-logfile - \
            --log-level ${GUNICORN_LOG_LEVEL:-info}
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - logs_volume:/var/log/seim
    networks:
      - seim-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy
    environment:
      - DJANGO_ENV=production
      - DEBUG=false
      - SECRET_KEY_FILE=/run/secrets/django_secret_key
      - DATABASE_URL=postgresql://${POSTGRES_USER:-seimuser}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-seim}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - VIRUS_SCANNER_TYPE=clamav
      - VIRUS_SCANNER_HOST=clamav
      - VIRUS_SCANNER_PORT=3310
      - AWS_ACCESS_KEY_ID_FILE=/run/secrets/aws_access_key_id
      - AWS_SECRET_ACCESS_KEY_FILE=/run/secrets/aws_secret_access_key
      - AWS_STORAGE_BUCKET_NAME=${AWS_STORAGE_BUCKET_NAME}
      - EMAIL_HOST_USER_FILE=/run/secrets/email_host_user
      - EMAIL_HOST_PASSWORD_FILE=/run/secrets/email_host_password
    secrets:
      - django_secret_key
      - db_password
      - redis_password
      - aws_access_key_id
      - aws_secret_access_key
      - email_host_user
      - email_host_password
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
      replicas: ${WEB_REPLICAS:-2}

  # Celery Worker
  celery:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: seim-celery-prod
    restart: unless-stopped
    command: celery -A seim worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-4}
    volumes:
      - media_volume:/app/media
      - logs_volume:/var/log/seim
    networks:
      - seim-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery inspect ping -d celery@$$HOSTNAME"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      - DJANGO_ENV=production
      - DEBUG=false
      - SECRET_KEY_FILE=/run/secrets/django_secret_key
      - DATABASE_URL=postgresql://${POSTGRES_USER:-seimuser}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-seim}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - VIRUS_SCANNER_TYPE=clamav
      - VIRUS_SCANNER_HOST=clamav
      - VIRUS_SCANNER_PORT=3310
      - AWS_ACCESS_KEY_ID_FILE=/run/secrets/aws_access_key_id
      - AWS_SECRET_ACCESS_KEY_FILE=/run/secrets/aws_secret_access_key
      - AWS_STORAGE_BUCKET_NAME=${AWS_STORAGE_BUCKET_NAME}
    secrets:
      - django_secret_key
      - db_password
      - redis_password
      - aws_access_key_id
      - aws_secret_access_key
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
      replicas: ${CELERY_REPLICAS:-2}

  # Celery Beat Scheduler
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: seim-celery-beat-prod
    restart: unless-stopped
    command: celery -A seim beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - logs_volume:/var/log/seim
    networks:
      - seim-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery status > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    environment:
      - DJANGO_ENV=production
      - DEBUG=false
      - SECRET_KEY_FILE=/run/secrets/django_secret_key
      - DATABASE_URL=postgresql://${POSTGRES_USER:-seimuser}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-seim}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
    secrets:
      - django_secret_key
      - db_password
      - redis_password
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: seim-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - logs_volume:/var/log/nginx
    networks:
      - seim-network
    depends_on:
      - web
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Log Aggregation (Optional)
  fluentd:
    image: fluent/fluentd:v1.16-debian-1
    container_name: seim-fluentd-prod
    restart: unless-stopped
    volumes:
      - ./fluentd/fluent.conf:/fluentd/etc/fluent.conf:ro
      - logs_volume:/var/log
    networks:
      - seim-network
    environment:
      - FLUENTD_CONF=fluent.conf
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  clamav_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  logs_volume:
    driver: local

networks:
  seim-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

secrets:
  django_secret_key:
    file: ./secrets/django_secret_key.txt
  db_password:
    file: ./secrets/db_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  aws_access_key_id:
    file: ./secrets/aws_access_key_id.txt
  aws_secret_access_key:
    file: ./secrets/aws_secret_access_key.txt
  email_host_user:
    file: ./secrets/email_host_user.txt
  email_host_password:
    file: ./secrets/email_host_password.txt
